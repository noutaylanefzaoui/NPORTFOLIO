<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forms</title>
</head>
<body>
    <form class="netlify-form-definition" name="contact" method="POST" action="/success.html" data-netlify="true" netlify-honeypot="bot-field" data-netlify-honeypot="bot-field" aria-hidden="true">
        <input type="hidden" name="form-name" value="contact">
        <input type="text" name="name">
        <input type="email" name="email">
        <input type="text" name="subject">
        <textarea name="message"></textarea>
        <input type="text" name="bot-field">
    </form>
    <style>
        .netlify-form-definition {
            position: absolute;
            overflow: hidden;
            clip: rect(0 0 0 0);
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            border: 0;
        }
    </style>
</body>
</html>
