<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forms</title>
</head>
<body>
    <form name="contact" method="POST" action="/" netlify data-netlify="true" netlify-honeypot="bot-field" data-netlify-honeypot="bot-field" style="display: none;">
        <input type="hidden" name="form-name" value="contact">
        <input type="text" name="name">
        <input type="email" name="email">
        <input type="text" name="subject">
        <textarea name="message"></textarea>
        <input type="text" name="bot-field">
    </form>
</body>
</html>
